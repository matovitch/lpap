[workspace]
authors = ["matovitch <camille.brugel@laposte.net>"]
channels = ["conda-forge"]
name = "lpap"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.0"

[tasks]

[tasks.test]
cmd = "PYTHONPATH=src python -m unittest discover -s test"
description = "Run the project test suite."

[tasks.bench-lpap]
cmd = "PYTHONPATH=src python bench/bench_lpap.py --batch {{ batch }} --values {{ values }} --buckets {{ buckets }} --k-max {{ k_max }} --warmup {{ warmup }} --iters {{ iters }}"
args = [
	{ arg = "batch", default = "256" },
	{ arg = "values", default = "1024" },
	{ arg = "buckets", default = "64" },
	{ arg = "k_max", default = "2" },
	{ arg = "warmup", default = "10" },
	{ arg = "iters", default = "50" },
]
description = "Benchmark PyTorch and Triton LPAP implementations."

[tasks.notebook-synthetic]
cmd = "PYTHONPATH=src marimo edit notebooks/synthetic_harmonics.py --no-token"
description = "Open the synthetic harmonic visualization marimo notebook."

[tasks.notebook-surrogate]
cmd = "PYTHONPATH=src marimo edit notebooks/train_surrogate.py --no-token"
description = "Open the LPAP surrogate training marimo notebook."

[dependencies]
pytorch-gpu = ">=2.10.0,<3"
python = ">=3.14.5,<3.15"
triton = ">=3.6.0,<4"
jaxtyping = ">=0.3.7,<0.4"
ruff = ">=0.15.14,<0.16"
cuda-driver-dev = ">=12.9.79,<13"
cuda-nvcc = ">=12.9.86,<13"
cuda-cudart-dev = ">=12.9.79,<13"
marimo = ">=0.23.5,<0.24"
