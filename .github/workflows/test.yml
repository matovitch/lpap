name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # The pixi environment requires CUDA (pytorch-gpu, triton, cuda-*), but
      # GitHub runners are CPU-only and lack the __cuda virtual package, so
      # `pixi install --locked` would refuse to solve. Mock the virtual package
      # so the CUDA build installs; it imports fine on CPU, the CUDA-gated tests
      # skip, and lpap_triton falls back to lpap_torch.
      CONDA_OVERRIDE_CUDA: "12.0"
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.0
        with:
          pixi-version: latest
          cache: true
      - run: pixi run lint
      - run: pixi run test