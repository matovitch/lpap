[image]
dataset_path = "data/images_32x32_gray.pt"
batch_size = 32
side = 32
normalize = true
shuffle = true
num_workers = 0

[source]
surrogate_checkpoint_name = "surrogate_synthetic.pt"
decoder_checkpoint_name = "decoder_synthetic.pt"
load_best = true
require_checkpoints = true

[flow]
sequence_length = 1024
width = 128
time_dim = 128
dilation_cycles = 2
dilations = [1, 2, 4, 8, 16, 32, 64, 128]
kernel_size = 3
zero_init_output = true

[teacher]
checkpoint_name = "energy_to_image.pt"
load_best = true
require_checkpoint = true
teacher_steps = 64
warm_start_student = true

[reflow]
student_steps = 8
endpoint_l2_weight = 1.0
image_anchor_l2_weight = 0.25

[optimizer]
learning_rate = 5.0e-5
max_grad_norm = 1.0

[validation]
enabled = true
every = 100
batch_size = 128
seed = 50123
validate_at_end = true
euler_steps = [4, 8, 16]

[run]
run_training = true
resume_from_checkpoint = true
steps = 10000
seed = 1987
display_every = 5
log_every = 1
run_id = "energy_to_image_reflow"
checkpoint_name = "energy_to_image_reflow_8.pt"
log_name = "energy_to_image_reflow.sqlite"
note = ""
tags = ["reflow", "8-step"]
pinned = false
